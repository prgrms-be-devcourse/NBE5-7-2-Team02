name: Java Style Check

on:
  pull_request:
    branches: [dev]

jobs:
  style-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: axel-op/googlejavaformat-action@v4
        with:
          args: "--replace --aosp"
          skip-commit: true
      - name: Print diffs
        run: git --no-pager diff --exit-code
